version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sepsis_db
    environment:
      POSTGRES_USER: sepsis_user
      POSTGRES_PASSWORD: sepsis_password
      POSTGRES_DB: sepsis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/sample_data.sql:/docker-entrypoint-initdb.d/02-sample_data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sepsis_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sepsis_network

  redis:
    image: redis:7-alpine
    container_name: sepsis_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sepsis_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sepsis_backend
    environment:
      DATABASE_URL: postgresql://sepsis_user:sepsis_password@db:5432/sepsis_db
      BACKEND_URL: http://backend:8000
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DEBUG: "False"
      REDIS_URL: redis://redis:6379
      JWT_SECRET_KEY: your-jwt-secret-key-change-in-production
      SECRET_KEY: your-super-secret-key-change-in-production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./ml_models:/app/ml_models
    networks:
      - sepsis_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sepsis_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - sepsis_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  sepsis_network:
    driver: bridge
